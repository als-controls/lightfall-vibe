# Release pipeline, triggered by v* tags. Mirrors lightfall's release.yml
# minus the Briefcase packaging jobs: lightfall-vibe is a plugin, not a
# standalone app, so the release artifacts are just the sdist and wheel.
#
#   - build-dist / publish-pypi: sdist + wheel to PyPI via OIDC trusted
#     publishing (environment: pypi; publisher registered on pypi.org against
#     this workflow file).
#   - release: GitHub Release with the dist files attached.
#
# workflow_dispatch builds the dist only (no publish, no release) — use it
# to test packaging changes without minting a new tag.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs derives the version from git tags
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist-pypi
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-pypi:
    needs: build-dist
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-pypi
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    needs: build-dist
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-pypi
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          name: Lightfall Vibe ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/**
